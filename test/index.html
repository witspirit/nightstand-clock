<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightstand Clock - Test Page</title>
    <link rel="stylesheet" href="../src/style.css">
    <style>
        /* Test Page specific styles */
        body {
            display: flex;
            flex-direction: column;
            overflow: auto; /* allow scrolling on test page */
        }
        #test-controls {
            padding: 20px;
            background: #333;
            color: #fff;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            z-index: 10;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 14px;
            color: #ccc;
        }
        input, select, button {
            padding: 5px;
            font-size: 16px;
        }
        #resync-indicator {
            min-width: 260px;
            padding: 8px 10px;
            border: 1px solid #555;
            border-radius: 4px;
            background: #1f1f1f;
            color: #9fe2a3;
            font-family: Menlo, Monaco, Consolas, monospace;
            font-size: 12px;
            line-height: 1.3;
            white-space: nowrap;
        }
        #palette-panel {
            width: min(420px, 42vw);
            min-width: 320px;
            max-height: calc(100vh - 140px);
            overflow: auto;
            padding: 12px 14px 16px;
            background: #2a2a2a;
            color: #f0f0f0;
            border-left: 1px solid #444;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #palette-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        #palette-preset {
            min-width: 170px;
            font-size: 13px;
            padding: 6px 8px;
        }
        #palette-title {
            font-size: 14px;
            color: #cfcfcf;
        }
        #palette-strip {
            position: relative;
            width: 100%;
            height: 28px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #555;
        }
        .palette-stop-line {
            position: absolute;
            top: 0;
            width: 1px;
            height: 100%;
            background: rgba(255, 255, 255, 0.5);
        }
        #palette-marker {
            position: absolute;
            top: -2px;
            width: 2px;
            height: 32px;
            background: #fff;
            box-shadow: 0 0 0 1px #000;
            transform: translateX(-1px);
        }
        #palette-labels {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 14px;
            font-family: Menlo, Monaco, Consolas, monospace;
            font-size: 11px;
            color: #d8d8d8;
        }
        .palette-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .palette-swatch {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            flex-shrink: 0;
        }
        #palette-editor {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 4px;
        }
        .palette-editor-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 12px;
            padding: 6px;
            border-radius: 6px;
            background: #242424;
        }
        .palette-editor-row input[type="number"] {
            width: 64px;
            padding: 4px 6px;
            font-size: 13px;
        }
        .palette-editor-row input[type="text"] {
            width: 96px;
            padding: 4px 6px;
            font-size: 13px;
            text-transform: uppercase;
        }
        .palette-editor-row input[type="color"] {
            width: 28px;
            height: 28px;
            border: none;
            padding: 0;
            background: transparent;
        }
        .palette-editor-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 2px;
        }
        #palette-editor-status {
            min-height: 18px;
            font-size: 12px;
            color: #c9d8ff;
        }
        .palette-action-btn {
            padding: 6px 10px;
            font-size: 13px;
            border: 1px solid #5d5d5d;
            border-radius: 4px;
            background: #3a3a3a;
            color: #fff;
            cursor: pointer;
        }
        .palette-action-btn:hover {
            background: #454545;
        }
        #palette-json {
            width: 100%;
            min-height: 84px;
            resize: vertical;
            border: 1px solid #555;
            border-radius: 4px;
            background: #1f1f1f;
            color: #eaeaea;
            font-family: Menlo, Monaco, Consolas, monospace;
            font-size: 12px;
            padding: 8px;
        }
        #test-main {
            flex: 1;
            display: flex;
            min-height: 0;
        }
        #clock-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 380px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        /* Override body background behavior for the wrapper instead */
        body { background-color: #222 !important; }
        #clock-wrapper { background-color: var(--bg-color, #000); transition: background-color 1s linear; }
        #clock-wrapper #clock-container {
            width: 100vmin;
            height: 100vmin;
            transform: scale(var(--clock-scale, 1));
            transform-origin: center center;
            transition: transform 0.15s linear;
        }
        @media (max-width: 1100px) {
            #test-main {
                flex-direction: column;
            }
            #palette-panel {
                width: 100%;
                min-width: 0;
                max-height: none;
                border-left: none;
                border-top: 1px solid #444;
            }
            #clock-wrapper {
                min-height: 55vh;
            }
        }
    </style>
</head>
<body>
    <div id="test-controls">
        <div class="control-group">
            <label for="time-mode">Time Mode</label>
            <select id="time-mode">
                <option value="real">Real Time</option>
                <option value="mock">Mock Time</option>
            </select>
        </div>
        
        <div class="control-group" id="mock-time-group" style="display: none;">
            <label for="mock-time">Mock Time</label>
            <input type="text" id="mock-time" value="12:00:00" inputmode="numeric" maxlength="8" placeholder="HH:MM:SS" autocomplete="off" spellcheck="false">
            <small>24h format (HH:MM:SS). Use Up/Down per section to step.</small>
        </div>

        <div class="control-group">
            <label for="size-slider">Clock Scale</label>
            <input type="range" id="size-slider" min="30" max="100" value="100">
        </div>

        <div class="control-group">
            <label for="resync-indicator">Last Hand Resync</label>
            <div id="resync-indicator" aria-live="polite">No resync yet</div>
        </div>
    </div>

    <div id="test-main">
        <div id="clock-wrapper">
            <div id="clock-container">
                <div id="clock-face">
                    <div id="ticks"></div>
                    <div id="digital-container">
                        <div id="digital-time">--:--</div>
                        <div id="digital-date">--</div>
                    </div>
                    <div id="hour-hand" class="hand"></div>
                    <div id="minute-hand" class="hand"></div>
                    <div id="second-hand" class="hand"></div>
                    <div id="center-dot"></div>
                </div>
            </div>
        </div>

        <div id="palette-panel">
            <div id="palette-title">Background Palette Timeline</div>
            <div id="palette-toolbar">
                <select id="palette-preset"></select>
                <button type="button" id="palette-apply-preset" class="palette-action-btn">Apply Preset</button>
                <button type="button" id="palette-add-stop" class="palette-action-btn">Add Stop</button>
            </div>
            <div id="palette-strip" aria-hidden="true">
                <div id="palette-marker"></div>
            </div>
            <div id="palette-labels"></div>
            <div id="palette-editor"></div>
            <div class="palette-editor-actions">
                <button type="button" id="palette-apply" class="palette-action-btn">Apply Palette</button>
                <button type="button" id="palette-reset" class="palette-action-btn">Reset Default</button>
                <button type="button" id="palette-export" class="palette-action-btn">Export JSON</button>
                <button type="button" id="palette-import" class="palette-action-btn">Import JSON</button>
            </div>
            <textarea id="palette-json" placeholder='Paste or copy color stops JSON here. Example: [[0,[10,10,30]],[6,[80,50,60]],[24,[10,10,30]]]'></textarea>
            <div id="palette-editor-status" aria-live="polite"></div>
        </div>
    </div>

    <!-- Set test mode so script.js doesn't auto-init -->
    <script>window.__TEST_MODE__ = true;</script>
    <script src="../src/script.js"></script>
    <script src="test.js"></script>
</body>
</html>
