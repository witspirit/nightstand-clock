<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightstand Clock - Test Page</title>
    <link rel="stylesheet" href="../src/style.css">
    <style>
        /* Test Page specific styles */
        body {
            display: flex;
            flex-direction: column;
            overflow: auto; /* allow scrolling on test page */
        }
        #test-controls {
            padding: 20px;
            background: #333;
            color: #fff;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            z-index: 10;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 14px;
            color: #ccc;
        }
        input, select, button {
            padding: 5px;
            font-size: 16px;
        }
        #resync-indicator {
            min-width: 260px;
            padding: 8px 10px;
            border: 1px solid #555;
            border-radius: 4px;
            background: #1f1f1f;
            color: #9fe2a3;
            font-family: Menlo, Monaco, Consolas, monospace;
            font-size: 12px;
            line-height: 1.3;
            white-space: nowrap;
        }
        #clock-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        /* Override body background behavior for the wrapper instead */
        body { background-color: #222 !important; }
        #clock-wrapper { background-color: var(--bg-color, #000); transition: background-color 1s linear; }
        #clock-wrapper #clock-container {
            width: 100vmin;
            height: 100vmin;
            transform: scale(var(--clock-scale, 1));
            transform-origin: center center;
            transition: transform 0.15s linear;
        }
    </style>
</head>
<body>
    <div id="test-controls">
        <div class="control-group">
            <label for="time-mode">Time Mode</label>
            <select id="time-mode">
                <option value="real">Real Time</option>
                <option value="mock">Mock Time</option>
            </select>
        </div>
        
        <div class="control-group" id="mock-time-group" style="display: none;">
            <label for="mock-time">Mock Time</label>
            <input type="text" id="mock-time" value="12:00:00" inputmode="numeric" maxlength="8" placeholder="HH:MM:SS" autocomplete="off" spellcheck="false">
            <small>24h format (HH:MM:SS). Use Up/Down per section to step.</small>
        </div>

        <div class="control-group">
            <label for="size-slider">Clock Scale</label>
            <input type="range" id="size-slider" min="30" max="100" value="100">
        </div>

        <div class="control-group">
            <label for="resync-indicator">Last Hand Resync</label>
            <div id="resync-indicator" aria-live="polite">No resync yet</div>
        </div>
    </div>

    <div id="clock-wrapper">
        <div id="clock-container">
            <div id="clock-face">
                <div id="ticks"></div>
                <div id="digital-container">
                    <div id="digital-time">--:--</div>
                    <div id="digital-date">--</div>
                </div>
                <div id="hour-hand" class="hand"></div>
                <div id="minute-hand" class="hand"></div>
                <div id="second-hand" class="hand"></div>
                <div id="center-dot"></div>
            </div>
        </div>
    </div>

    <!-- Set test mode so script.js doesn't auto-init -->
    <script>window.__TEST_MODE__ = true;</script>
    <script src="../src/script.js"></script>
    <script src="test.js"></script>
</body>
</html>
